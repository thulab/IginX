####################
### 元数据
####################

# iginx 绑定的 ip
ip=0.0.0.0

# iginx 绑定的端口
port=6888

# iginx 本身的用户名
username=root

# iginx 本身的密码
password=root

# zookeeper 连接字符串，目前是填写的本机地址
zookeeperConnectionString=127.0.0.1:2181

# 时序数据库列表，使用','分隔不同实例
storageEngineList=127.0.0.1#6667#iotdb#username=root#password=root#readSessions=100#writeSessions=100
#storageEngineList=127.0.0.1#8086#influxdb#url=http://localhost:8086/

# tdengine，并且使用 rest 访问接口时候使用
#storgaeEngineList=127.0.0.1#6041#tdengine#db=tpc#maxActive=50#minIdle=10#initialSize=10#maxWait=30000#conn=rest

# tdengine，并且使用 jni 访问接口时候使用（最好都再调下参数）
#storgaeEngineList=127.0.0.1#6041#tdengine#db=tpc#maxActive=50#minIdle=10#initialSize=10#maxWait=30000#conn=jni

# 异步请求最大重复次数
maxAsyncRetryTimes=3

# 异步执行并发数
asyncExecuteThreadPool=20

# 同步执行并发数
syncExecuteThreadPool=60

# 写入的副本个数
replicaNum=1

# 底层数据库类名
databaseClassNames=iotdb=cn.edu.tsinghua.iginx.iotdb.IoTDBPlanExecutor,influxdb=cn.edu.tsinghua.iginx.influxdb.InfluxDBPlanExecutor,tdengine=cn.edu.tsinghua.iginx.tdengine.TDEngineExecutor

# 策略类名
policyClassName=cn.edu.tsinghua.iginx.policy.NativePolicy

# 统计信息收集类
# statisticsCollectorClassName=cn.edu.tsinghua.iginx.statistics.StatisticsCollector

# 统计信息打印间隔，单位毫秒
statisticsLogInterval=1000

####################
### Rest 服务配置
####################

restip=0.0.0.0

restport=6666

enableRestService=true

####################
### InfluxDB 配置
####################

# InfluxDB token
influxDBToken=your-token

# InfluxDB organization
influxDBOrganizationName=my-org

####################
### TDEngine 配置
####################

# rest 接口用这个
tdEngineDriver=com.taosdata.jdbc.rs.RestfulDriver
# jni 接口用这个
# tdEngineDriver=com.taosdata.jdbc.TSDBDriver